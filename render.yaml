services:
  - type: web
    name: facebook-reply-bot
    runtime: go
    plan: free
    buildCommand: go build -tags netgo -ldflags '-s -w' -o bot .
    startCommand: ./bot
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: GIN_MODE
        value: release
      - key: GRAPH_API_VERSION
        value: v24.0
      - key: RESEND_FROM
        value: Messenger Bot <onboarding@resend.dev>
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false

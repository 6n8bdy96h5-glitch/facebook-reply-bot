services:
  - type: web
    name: facebook-reply-bot
    runtime: go
    plan: free
    buildCommand: go build -tags netgo -ldflags '-s -w' -o bot .
    startCommand: ./bot
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: GIN_MODE
        value: release
      - key: GRAPH_API_VERSION
        value: v24.0
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USERNAME
        value: info98yy@gmail.com
      - key: NOTIFY_EMAIL
        value: info98yy@gmail.com
      - key: VERIFY_TOKEN
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: SMTP_PASSWORD
        sync: false

